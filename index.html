<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时贞的小站 · 主页</title>
  <style>
    /* 全局样式 (与之前保持一致) */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f1f4f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1.5rem; }
    .site-wrapper { max-width: 1000px; width: 100%; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 2.5rem; box-shadow: 0 25px 45px -12px rgba(0,10,30,0.25); padding: 2rem 2rem 3rem; border: 1px solid rgba(255,255,255,0.5); }
    .site-header { text-align: center; margin-bottom: 1.8rem; }
    .site-header h1 { font-size: 3.2rem; font-weight: 400; letter-spacing: 6px; color: #2c3e50; text-shadow: 2px 2px 0 rgba(255,255,255,0.8); border-bottom: 1px dashed #b3c4d4; padding-bottom: 0.8rem; font-family: 'Times New Roman', serif; }
    .nav-bar { display: flex; justify-content: center; gap: 2.5rem; margin-bottom: 2.8rem; flex-wrap: wrap; padding: 0.5rem 1rem; background: rgba(255,255,255,0.4); border-radius: 60px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.6); }
    .nav-link { font-size: 1.25rem; font-weight: 500; color: #2a405c; text-decoration: none; padding: 0.5rem 1.2rem; border-radius: 40px; transition: all 0.2s; background: transparent; }
    .nav-link:hover { background: rgba(255,255,255,0.7); color: #1b2b3f; }
    .nav-link.active { background: white; color: #1e3c5a; box-shadow: 0 4px 8px rgba(0,20,40,0.1); border: 1px solid rgba(120,150,180,0.3); }
    .content-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); border-radius: 32px; padding: 2rem 2.2rem; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 12px 25px -15px rgba(40,50,70,0.2); line-height: 1.6; color: #1e2e3e; }
    .markdown-body { overflow-x: auto; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 450; margin: 1.2rem 0 0.8rem; color: #1e3a5a; border-bottom: 1px dotted #cad6e3; }
    .markdown-body table { border-collapse: collapse; width: 100%; margin: 1.5rem 0; background: rgba(250,252,255,0.7); border-radius: 20px; }
    .markdown-body th, .markdown-body td { padding: 0.75rem 1rem; border: 1px solid #cfdeed; }
    .markdown-body code { background: #eef3f8; padding: 0.2rem 0.5rem; border-radius: 12px; }
    .loading-placeholder { color: #6f8a9f; font-style: italic; padding: 2rem; text-align: center; background: rgba(255,255,255,0.5); border-radius: 30px; }
    @media (max-width: 600px) { .site-wrapper { padding: 1.5rem 1rem; } .site-header h1 { font-size: 2.5rem; } .nav-bar { gap: 0.8rem; } .nav-link { font-size: 1rem; padding: 0.4rem 0.9rem; } }
  </style>
</head>
<body>
<div class="site-wrapper">
  <header class="site-header"><h1>时贞的小站</h1></header>
  <nav class="nav-bar">
    <a href="index.html" class="nav-link active">主页</a>
    <a href="novalat.html" class="nav-link">Novalat语言频道</a>
    <a href="chitchat.html" class="nav-link">杂谈频道</a>
  </nav>
  <main>
    <div class="content-card">
      <div id="content" class="markdown-body"><div class="loading-placeholder">⏳ 加载主页内容...</div></div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  (async function() {
    const container = document.getElementById('content');
    try {
      const res = await fetch('markdown/home.md');
      if (!res.ok) throw new Error('文件不存在');
      const md = await res.text();
      container.innerHTML = marked.parse(md);
    } catch (e) {
      container.innerHTML = `<div class="loading-placeholder">⚠️ 无法加载 markdown/home.md，请创建该文件。</div>`;
    }
  })();
</script>
</body>
</html>
